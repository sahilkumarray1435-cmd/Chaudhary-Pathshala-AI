<?xml version='1.0' encoding='utf-8'?>
<widget id="com.chaudhary.pathshala" version="1.0.0" xmlns="http://www.w3.org/ns/widgets">
    <name>Chaudhary Pathshala AI</name>
    <description>AI Coaching App</description>
    <author>Sahil</author>
    <content src="index.html"/>
    <access origin="*"/>
    <allow-intent href="http://*/*"/>
    <allow-intent href="https://*/*"/>
    <platform name="android">
        <preference name="android-minSdkVersion" value="21"/>
        <preference name="android-targetSdkVersion" value="33"/>
        <preference name="MixedContentMode" value="0"/>
        <allow-navigation href="*"/>
    </platform>
    <plugin name="cordova-plugin-inappbrowser" spec="^5.0.0"/>
    <plugin name="cordova-plugin-whitelist" spec="^1.3.4"/>
    </widget>
