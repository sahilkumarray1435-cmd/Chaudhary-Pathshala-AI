<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">
<title>Chaudhary Pathshala AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0A1628;overflow:hidden;}
#loader{position:fixed;inset:0;background:linear-gradient(135deg,#0A1628,#1B5E20,#E65100);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
.logo{font-size:64px;margin-bottom:16px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
.title{color:#fff;font-size:22px;font-weight:800;font-family:Arial,sans-serif;margin-bottom:8px;}
.sub{color:rgba(255,255,255,.6);font-size:13px;font-family:Arial,sans-serif;margin-bottom:28px;}
.bar-wrap{width:200px;height:5px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;}
.bar{height:100%;background:linear-gradient(90deg,#2EAD5C,#FF6B00);border-radius:10px;animation:load 2.5s ease forwards;}
@keyframes load{from{width:0}to{width:100%}}
iframe{width:100vw;height:100vh;border:none;display:block;}
</style>
</head>
<body>
<div id="loader">
  <div class="logo">🏫</div>
  <div class="title">चौधरी पाठशाला AI</div>
  <div class="sub">Loading your AI Teacher...</div>
  <div class="bar-wrap"><div class="bar"></div></div>
</div>
<iframe id="appFrame"
  src="https://confidential-amethyst-3rt4rk3vro.edgeone.app/"
  allow="camera; microphone; autoplay; clipboard-read; clipboard-write"
  allowfullscreen>
</iframe>
<script>
setTimeout(function(){
  var l=document.getElementById('loader');
  l.style.opacity='0';l.style.transition='opacity .5s';
  setTimeout(function(){l.style.display='none';},500);
},2500);
document.addEventListener('deviceready',function(){console.log('Cordova OK');},false);
</script>
</body>
</html>
